services:
  db:
    image: postgres:15
    container_name: capanaparo_db
    restart: always
    environment:
      POSTGRES_DB: capanaparo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
